services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: pmos
      POSTGRES_USER: pmos
      POSTGRES_PASSWORD: pmos
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  django:
    build: .
    command: >
      sh -c "uv run python manage.py migrate &&
             uv run python manage.py collectstatic --noinput &&
             uv run gunicorn pmos.wsgi:application -b :8000 -w 4"
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"

  celery-worker:
    build: .
    command: uv run celery -A pmos worker -l info
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app

  celery-beat:
    build: .
    command: uv run celery -A pmos beat -l info
    env_file: .env
    depends_on:
      - redis
    volumes:
      - .:/app

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - media_volume:/media
      - ./frontend/dist:/frontend
    ports:
      - "80:80"
    depends_on:
      - django

volumes:
  pgdata:
  static_volume:
  media_volume:
