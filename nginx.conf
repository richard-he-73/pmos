server {
    listen 80;
    charset utf-8;

    # Vue 前端
    location / {
        root /frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Django API
    location /api/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
    }

    # 静态文件
    location /static/ {
        alias /static/;
    }

    location /media/ {
        alias /media/;
    }
}
