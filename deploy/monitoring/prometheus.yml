global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'pmos-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:18001']

  - job_name: 'pmos-mongodb'
    static_configs:
      - targets: ['mongodb-exporter:9216']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
