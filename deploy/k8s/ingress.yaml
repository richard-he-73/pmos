apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pmos-ingress
  namespace: pmos
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - pmos.example.com
      secretName: pmos-tls
  rules:
    - host: pmos.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: pmos-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pmos-frontend
                port:
                  number: 80
