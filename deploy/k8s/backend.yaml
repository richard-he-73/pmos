apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: pmos
  labels:
    app: pmos-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pmos-backend
  template:
    metadata:
      labels:
        app: pmos-backend
    spec:
      containers:
        - name: backend
          image: pmos/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: pmos-backend-config
          env:
            - name: MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: pmos-secrets
                  key: mongo-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pmos-secrets
                  key: jwt-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pmos-backend
  namespace: pmos
spec:
  selector:
    app: pmos-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: pmos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
