apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: pmos
  labels:
    app: pmos-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pmos-frontend
  template:
    metadata:
      labels:
        app: pmos-frontend
    spec:
      containers:
        - name: frontend
          image: pmos/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pmos-frontend
  namespace: pmos
spec:
  selector:
    app: pmos-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: pmos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
